<!DOCTYPE html>
<html>
<head>
	<meta charset = "UTF-8">
	<title>My First Website</title>
	<style>
		body {
			background-color: #f0f0f0;
			font-family: 'Arial', sans-serif;
			margin: 0;
			}
			.topbar {
				max-width: 1430px;
				margin: 0 auto;
				display: flex;
				justify-content: space-between;
				align-items: center;
				background-color: #ffb3c6;
				padding: 45px 60px;
				box-sizing: border-box;
			}
			.logo {
				font-size: 28px;
				font-weight: bold;
			}
			.nav a {
				margin-left: 20px;
				text-decoration: none;
				color: #333;
				font-weight: 500;
			}
			.container {
				min-height: 100vh;
				max-width: 1430px;
				margin: 0 auto;
				background-color: #ffffff;
				padding: 20px 40px;
				box-sizing: border-box;
			}
			h1 {
				display: inline-block;
				color: black;
				background-color: #ff4d6d;
				margin-bottom: 50px;
			}
			p {
				font-size: 18px;
				text-align: left;
			}
			.sidebar {
				width: 250px;
				background-color: #f4f4f4;
				height: 100vh;
				padding-top: 20px;
				box-shadow: 2px 0 5px rgba(0, 0, 0,0.1);
				position: fixed;
				top: 0;
				left: -250px;
				padding-top: 20px;
				transition: left 0.3s ease;
			}
			.sidebar.open {
				left: 0;
			}
			.open-btn, .close-btn {
				background-color: #ff4d6d;
				color: white;
				border: none;
				padding: 10px 15px;
				border-radius: 6px;
				cursor: pointer;
				font-size: 16px;
			}
			.close-btn {
				margin-left: 10px;
				margin-bottom: 20px;
			}
			.sidebar a {
				display: block;
				padding: 15px 20px;
				color: #333;
				text-decoration: none;
			}
			.sidebar a:hover {
				background: #ddd;
			}
			.content {
				text-align: left;
				padding: 20px;
			}
			.link-box {
				margin-bottom: 30px;
			}
			.button-box {
				margin-bottom: 40px;
			}
			button {
				padding: 12px 24px;
				font-size: 16px;
				background-color: #ff4d6d;
				color: white;
				border: none;
				border-radius: 8px;
				cursor: pointer;
				display: inline-block;
				}
			.gallery {
				margin-top: 30px;
				margin-bottom: 30px;
			}
	</style>
</head>
<body>
	<header class="topbar">
			<div class="logo">Test</div>
			<nav class="nav">
			<div class="sidebar" id="sidebar">
		<button class="close-btn" onclick="closeSidebar()">✖</button>
		<a href="#home">Home</a>
		<a href="#gallery">Gallery</a>
			</div>
	</header>
	<div class="container">
	<div class="content">
	<button class="open-btn" onclick="openSidebar()">☰ Menu</button>
		<section id="home">
			<h2>Home</h2>
			<p>Welcome to my website!</p>
		</section>
		
		<p>I don't know what to write yet</p>
		<section id="gallery">
			<h2>Gallery</h2>
			<p>Here are some cute pictures :3</p>
		</section>
		<section class="gallery">
			<img src="soymilk.jpg" width="200">
		</section>
		<div class="link-box">
			<a href="https://google.com"> Go to Google</a>
		</div>
	<div class="button-box">
		<button onclick="alert('Hello!')">CLICK ME ^-^</button>
	</div>
	</div>
	</div>
	<script>
	function openSidebar() {
		document.getElementById("sidebar").classList.add("open");
		}
		
	function closeSidebar() {
		document.getElementById("sidebar").classList.remove("open");
		}
	</script>
</body>
</html>
